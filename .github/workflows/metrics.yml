name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: blog-posts.svg
          base: ""
          plugin_rss: yes
          plugin_rss_source: https://www.yeonjoong.dev/rss.xml
          plugin_rss_limit: 5
